name: Sync Algolia Index

on:
  pull_request:
    paths:
      - 'src/content/docs/**/*.mdx'
      - 'src/lib/data/nav.ts'
      - 'scripts/sync-algolia.ts'
      - 'scripts/lib/**'

  push:
    branches: [main]
    paths:
      - 'src/content/docs/**/*.mdx'
      - 'src/lib/data/nav.ts'
      - 'scripts/sync-algolia.ts'
      - 'scripts/lib/**'

  # 支持手动触发（用于首次全量同步或故障恢复）
  workflow_dispatch:

concurrency:
  group: sync-algolia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Validate and sync documents to Algolia
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Algolia sync payload
        run: pnpm algolia:dry-run

      - name: Sync to Algolia
        if: github.event_name != 'pull_request'
        run: pnpm tsx scripts/sync-algolia.ts
        env:
          NEXT_PUBLIC_ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          NEXT_PUBLIC_ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
